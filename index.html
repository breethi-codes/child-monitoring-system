<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Online Exam Practice</title>
<link href="style.css" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<body class="bg-light">
</head>
<body>
 
    <div class="container mt-5">

    <h2 class="text-center mb-4">Child Registration Form</h2>

    <form id="childForm">

        <div class="mb-3">
            <label class="form-label">Child Name</label>
            <input type="text" class="form-control" id="childName" placeholder="Enter Child Name">
        </div>

        <div class="mb-3">
            <label class="form-label">Age</label>
            <input type="number" class="form-control" id="age" placeholder="Enter Age">
        </div>

        <div class="mb-3">
            <label class="form-label">Parent Name</label>
            <input type="text" class="form-control" id="parentName" placeholder="Enter Parent Name">
        </div>

        <div class="mb-3">
            <label class="form-label">Phone Number</label>
            <input type="tel" class="form-control" id="phone" placeholder="Enter Phone Number">
        </div>

        <div class="text-center">
            <button type="button" class="btn btn-primary" id="submitBtn">
                Submit
            </button>
        </div>

    </form>
     <div id="qrcode" class="mt-4 text-center"></div>


</div>

<script src="script.js"></script>
</body>
</html>
